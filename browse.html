<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ColabOS — Browse Projects</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    [data-theme="dark"]{--bg:#050608;--surface:#0d0f12;--border:#1a1d24;--accent:#00ff88;--accent2:#0066ff;--accent3:#ff3366;--text:#f0f2f5;--muted:#5a6070;--card:#0f1117;--nav-bg:rgba(5,6,8,0.88);--grid:rgba(255,255,255,0.02);--g1:rgba(0,255,136,0.06);}
    [data-theme="light"]{--bg:#f5f5f0;--surface:#eaeae4;--border:#d4d4cc;--accent:#007a3d;--accent2:#0044cc;--accent3:#cc1144;--text:#0a0a0a;--muted:#6b6b60;--card:#ffffff;--nav-bg:rgba(245,245,240,0.94);--grid:rgba(0,0,0,0.04);--g1:rgba(0,122,61,0.05);}
    [data-theme="midnight"]{--bg:#0a0014;--surface:#120020;--border:#2a0050;--accent:#bf00ff;--accent2:#ff00aa;--accent3:#00d4ff;--text:#f0e8ff;--muted:#6b4d8a;--card:#100018;--nav-bg:rgba(10,0,20,0.9);--grid:rgba(191,0,255,0.04);--g1:rgba(191,0,255,0.07);}
    [data-theme="solar"]{--bg:#1a1200;--surface:#241900;--border:#3d2e00;--accent:#ffcc00;--accent2:#ff6600;--accent3:#ff3300;--text:#fff8e0;--muted:#7a6530;--card:#1e1500;--nav-bg:rgba(26,18,0,0.9);--grid:rgba(255,204,0,0.04);--g1:rgba(255,204,0,0.07);}
    [data-theme="ice"]{--bg:#f0f8ff;--surface:#e2f0fb;--border:#b8d8f0;--accent:#0088cc;--accent2:#0055aa;--accent3:#cc4400;--text:#0a1a2a;--muted:#5a7a9a;--card:#ffffff;--nav-bg:rgba(240,248,255,0.94);--grid:rgba(0,136,204,0.06);--g1:rgba(0,136,204,0.07);}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans Mono',monospace;overflow-x:hidden;cursor:none;transition:background .35s,color .35s;}
    #cur{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,width .2s,height .2s;mix-blend-mode:difference;}
    #curR{position:fixed;width:32px;height:32px;border:1.5px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.4;transition:border-color .3s,transform .2s;}
    body.hov #cur{width:18px;height:18px;}
    body.hov #curR{transform:translate(-50%,-50%) scale(1.5);opacity:.7;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:100;opacity:.3;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
    .ts{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
    .tp{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;display:none;flex-direction:column;gap:4px;min-width:172px;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:popUp .2s cubic-bezier(.16,1,.3,1);}
    .tp.open{display:flex;}
    @keyframes popUp{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .tp-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:4px 8px 8px;border-bottom:1px solid var(--border);margin-bottom:2px;}
    .to{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:none;font-size:11px;font-weight:600;transition:all .15s;border:1px solid transparent;color:var(--text);}
    .to:hover{background:var(--card);border-color:var(--border);}
    .to.active{border-color:var(--accent);color:var(--accent);}
    .sw{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1px solid rgba(128,128,128,.2);}
    .tb{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans Mono',monospace;font-size:11px;font-weight:700;padding:9px 14px;border-radius:8px;cursor:none;display:flex;align-items:center;gap:7px;transition:all .25s cubic-bezier(.16,1,.3,1);}
    .tb:hover{border-color:var(--accent);color:var(--accent);}
    nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:0 48px;height:62px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--nav-bg);backdrop-filter:blur(20px);transition:background .35s,border-color .35s;}
    .logo{font-weight:900;font-size:20px;letter-spacing:-1px;color:var(--text);text-decoration:none;}
    .logo span{color:var(--accent);}
    .nav-links{display:flex;align-items:center;gap:28px;}
    .nav-links a{font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.5px;transition:color .2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--accent);}
    .btn-primary{background:var(--accent);color:var(--bg);border:none;font-family:'Noto Sans Mono',monospace;font-weight:800;font-size:12px;padding:9px 20px;border-radius:6px;text-decoration:none;cursor:none;transition:all .25s cubic-bezier(.16,1,.3,1);letter-spacing:.5px;}
    .btn-primary:hover{opacity:.87;transform:translateY(-1px);}\n\n                /* SIDE NAV */
    .app{display:flex;min-height:100vh;position:relative;z-index:1;}
    .side-nav{position:fixed;top:0;left:0;bottom:0;width:64px;background:var(--surface);border-right:1px solid var(--border);padding:18px 10px;display:flex;flex-direction:column;gap:8px;z-index:80;box-shadow:0 20px 60px rgba(0,0,0,.35);transition:width .28s cubic-bezier(.16,1,.3,1);}
    .side-nav:hover{width:220px;}
    .side-logo{font-weight:900;font-size:18px;letter-spacing:-1px;color:var(--text);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 6px;margin-bottom:6px;white-space:nowrap;overflow:hidden;}
    .side-nav:hover .side-logo{justify-content:flex-start;padding:8px 10px;}
    .side-logo span{color:var(--accent);transition:color .35s;}
    .logo-text{color:var(--text);}
    .side-section{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:10px 10px 4px;display:none;}
    .side-nav:hover .side-section{display:block;}
    .side-link{display:flex;align-items:center;justify-content:center;gap:10px;padding:9px 8px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.3px;transition:all .25s cubic-bezier(.16,1,.3,1);}
    .side-nav:hover .side-link{justify-content:flex-start;padding:9px 10px;}
    .side-link:hover{background:color-mix(in srgb,var(--accent) 6%,transparent);color:var(--text);}
    .side-link.active{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);}    
    .side-ico{width:18px;height:18px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--muted);background:var(--card);flex-shrink:0;}
    .side-ico svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .side-link.active .side-ico{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,transparent);}    
    .side-text{opacity:0;max-width:0;overflow:hidden;white-space:nowrap;transition:opacity .22s ease,max-width .28s cubic-bezier(.16,1,.3,1);}
    .side-nav:hover .side-text{opacity:1;max-width:160px;}
    .side-spacer{flex:1;}
        .nav-scrim{position:fixed;inset:0;background:rgba(0,0,0,.22);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:70;}
    .side-nav:hover + .nav-scrim{opacity:1;pointer-events:auto;}
.app-main{margin-left: 84px;width: 93%;transition:none;}@media(max-width:900px){
      .nav-scrim{display:none;}

      .side-nav{position:fixed;left:0;right:0;bottom:0;top:auto;height:68px;width:100%;flex-direction:row;align-items:center;gap:8px;padding:8px 10px;border-right:none;border-top:1px solid var(--border);overflow-x:auto;}
      .side-nav:hover{width:100%;}
      .side-section,.side-logo,.side-spacer{display:none;}
      .side-link{flex-direction:column;gap:4px;font-size:10px;padding:6px 8px;}
      .side-nav:hover .side-link{justify-content:center;padding:6px 8px;}
      .side-text{opacity:1;max-width:100px;}
      .side-ico{width:22px;height:22px;font-size:11px;}
      .side-ico svg{width:16px;height:16px;}
      .app-main{margin-left:0;padding-bottom:86px;}
    }


    /* SEARCH + FILTERS */
    .search-bar{display:flex;gap:10px;margin-bottom:20px;animation:fadeInUp .5s ease .1s both;}
    .search-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans Mono',monospace;font-size:13px;padding:13px 18px;border-radius:7px;outline:none;transition:all .25s cubic-bezier(.16,1,.3,1);}
    .search-input::placeholder{color:var(--muted);}
    .search-input:focus{border-color:var(--accent);}
    select.search-input{cursor:none;max-width:160px;}

    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;animation:fadeInUp .5s ease .15s both;}
    .filter-tag{font-size:11px;font-weight:700;padding:7px 16px;border-radius:100px;border:1px solid var(--border);color:var(--muted);cursor:none;transition:all .25s cubic-bezier(.16,1,.3,1);letter-spacing:.3px;background:transparent;}
    .filter-tag:hover{border-color:var(--accent);color:var(--accent);}
    .filter-tag.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

    /* GRID */
    .projects-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;}
    .pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all .3s;cursor:none;position:relative;overflow:hidden;animation:fadeInUp .5s ease both;}
    .pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pc-color,var(--accent));transform:scaleX(0);transition:transform .3s;}
    .pcard:hover::before{transform:scaleX(1);}
    .pcard:hover{border-color:var(--pc-color,var(--accent));transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.2);}
    .pc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
    .pc-title{font-size:15px;font-weight:800;letter-spacing:-.3px;}
    .badge{display:inline-flex;font-size:9px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.5px;}
    .badge-green{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);}
    .badge-blue{background:color-mix(in srgb,var(--accent2) 12%,transparent);color:var(--accent2);border:1px solid color-mix(in srgb,var(--accent2) 25%,transparent);}
    .badge-red{background:color-mix(in srgb,var(--accent3) 12%,transparent);color:var(--accent3);border:1px solid color-mix(in srgb,var(--accent3) 25%,transparent);}
    .pc-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
    .pc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .pc-tag{font-size:10px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:4px;transition:all .35s;}
    .pc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);}
    .pc-meta{font-size:10px;color:var(--muted);}
    .pc-reward{font-size:12px;font-weight:800;color:var(--accent);}
    .pc-owner{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
    .pc-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
    .pc-oname{font-size:11px;font-weight:600;color:var(--muted);}

    .btn-apply{display:block;width:100%;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);color:var(--accent);font-family:'Noto Sans Mono',monospace;font-size:11px;font-weight:800;padding:10px;border-radius:7px;cursor:none;transition:all .25s cubic-bezier(.16,1,.3,1);text-align:center;margin-top:14px;letter-spacing:.5px;}
    .btn-apply:hover{background:var(--accent);color:var(--bg);}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:900px){
      .nav-scrim{display:none;}
      .projects-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }
    @media(max-width:600px){.projects-grid{grid-template-columns:1fr;}.page{padding:90px 18px 40px;}.search-bar{flex-direction:column;}select.search-input{max-width:100%;}}
  </style>
</head>

<script>
  const projects = [
    {title:"HealthTrack AI",desc:"AI-powered health tracking app. Need a mobile developer experienced with React Native and health APIs.",tags:["React Native","AI","Health"],reward:"20% equity",owner:"AK",ownerName:"Arjun K.",color:"var(--accent)",badge:"🔥 Hot",badgeClass:"badge-green",delay:.2},
    {title:"EduFlow Platform",desc:"E-learning marketplace connecting tutors and students globally. Looking for a backend engineer and UX designer.",tags:["Node.js","PostgreSQL","UX"],reward:"$2,000 bounty",owner:"SM",ownerName:"Sara M.",color:"var(--accent2)",badge:"⚡ New",badgeClass:"badge-blue",delay:.25},
    {title:"RetailOS Dashboard",desc:"Analytics dashboard for small retail businesses. Need a data engineer and a designer for the frontend.",tags:["Python","Data","React"],reward:"15% revenue",owner:"JL",ownerName:"Jake L.",color:"var(--accent3)",badge:"● Open",badgeClass:"badge-red",delay:.3},
    {title:"Crypto Portfolio Tracker",desc:"Real-time crypto portfolio management with DeFi integrations and automated rebalancing features.",tags:["Web3","Solidity","Next.js"],reward:"25% equity",owner:"PK",ownerName:"Priya K.",color:"var(--accent)",badge:"🔥 Hot",badgeClass:"badge-green",delay:.35},
    {title:"Social Commerce App",desc:"TikTok-style short video platform for selling products. Need a video streaming engineer and mobile dev.",tags:["Flutter","Firebase","FFmpeg"],reward:"$5,000 bounty",owner:"RN",ownerName:"Ravi N.",color:"var(--accent2)",badge:"⚡ New",badgeClass:"badge-blue",delay:.4},
    {title:"AI Writing Assistant",desc:"Context-aware writing assistant for developers. Integrates into IDEs and improves code documentation.",tags:["Python","LLMs","VSCode API"],reward:"20% revenue",owner:"ML",ownerName:"Maya L.",color:"var(--accent)",badge:"🤖 AI",badgeClass:"badge-green",delay:.45},
    {title:"GreenRoute — EV App",desc:"Route planning app for electric vehicles with real-time charging station availability and predictions.",tags:["React Native","Maps API","IoT"],reward:"18% equity",owner:"DK",ownerName:"Dev K.",color:"var(--accent3)",badge:"● Open",badgeClass:"badge-red",delay:.5},
    {title:"Freelance Invoice Tool",desc:"Smart invoicing platform for freelancers with AI expense tracking, tax calculation, and payment reminders.",tags:["Next.js","Stripe","AI"],reward:"$1,500 bounty",owner:"ZR",ownerName:"Zara R.",color:"var(--accent2)",badge:"⚡ New",badgeClass:"badge-blue",delay:.55},
    {title:"Open Source UI Library",desc:"A comprehensive, accessible UI component library for React with dark mode and theming support.",tags:["React","TypeScript","CSS"],reward:"Community + credit",owner:"NT",ownerName:"Nate T.",color:"var(--accent)",badge:"🌐 Open Source",badgeClass:"badge-green",delay:.6},
  ];

  const grid = document.getElementById('projectsGrid');
  const searchInput = document.getElementById('searchInput');
  const categorySelect = document.getElementById('categorySelect');
  const rewardSelect = document.getElementById('rewardSelect');
  let activeTag = 'All';

  function matchesCategory(p, cat){
    if(cat==='All Categories') return true;
    const t = p.tags.join(' ').toLowerCase();
    const d = p.desc.toLowerCase();
    switch(cat){
      case 'Web Dev': return t.includes('web')||t.includes('react')||t.includes('next')||t.includes('node');
      case 'Mobile': return t.includes('react native')||t.includes('flutter')||t.includes('mobile');
      case 'AI/ML': return t.includes('ai')||t.includes('ml')||t.includes('llm');
      case 'Design': return t.includes('design')||t.includes('ux')||t.includes('ui');
      case 'Marketing': return t.includes('marketing')||d.includes('marketing');
      default: return true;
    }
  }

  function matchesReward(p, sel){
    if(sel==='Any Reward') return true;
    const r = p.reward.toLowerCase();
    if(sel==='Equity') return r.includes('equity');
    if(sel==='Revenue Share') return r.includes('revenue');
    if(sel==='Bounty') return r.includes('bounty') || r.includes('$');
    return true;
  }

  function matchesTag(p, tag){
    if(tag==='All') return true;
    const t = p.tags.join(' ').toLowerCase();
    if(tag.includes('Hot')) return p.badge.includes('Hot');
    if(tag.includes('New')) return p.badge.includes('New');
    if(tag.includes('AI/ML')) return t.includes('ai')||t.includes('ml')||t.includes('llm');
    if(tag.includes('Mobile')) return t.includes('react native')||t.includes('flutter')||t.includes('mobile');
    if(tag.includes('Web')) return t.includes('web')||t.includes('react')||t.includes('next');
    if(tag.includes('Design')) return t.includes('design')||t.includes('ux')||t.includes('ui');
    if(tag.includes('High Reward')) return /\$|equity|revenue/i.test(p.reward);
    return true;
  }

  function bindCardHover(){
    document.querySelectorAll('.pcard').forEach(el=>{
      el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
      el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
    });
  }

  function render(list){
    grid.innerHTML = list.map(p=>`<div class="pcard" style="--pc-color:${p.color};animation-delay:${p.delay}s">
      <div class="pc-owner">
        <div class="pc-av" style="background:color-mix(in srgb,${p.color} 15%,transparent);color:${p.color};">${p.owner}</div>
        <span class="pc-oname">${p.ownerName}</span>
      </div>
      <div class="pc-header">
        <div class="pc-title">${p.title}</div>
        <span class="badge ${p.badgeClass}">${p.badge}</span>
      </div>
      <div class="pc-desc">${p.desc}</div>
      <div class="pc-tags">${p.tags.map(t=>`<span class="pc-tag">${t}</span>`).join('')}</div>
      <div class="pc-footer">
        <span class="pc-meta">???? ${Math.floor(Math.random()*4)+1}/${Math.floor(Math.random()*3)+2} spots</span>
        <span class="pc-reward">${p.reward}</span>
      </div>
      <button class="btn-apply">Apply to Collaborate ???</button>
    </div>`).join('');
    bindCardHover();
  }

  function applyFilters(){
    const q = (searchInput.value||'').trim().toLowerCase();
    const cat = categorySelect.value;
    const rew = rewardSelect.value;
    const list = projects.filter(p=>{
      const hay = `${p.title} ${p.desc} ${p.tags.join(' ')} ${p.ownerName}`.toLowerCase();
      if(q && !hay.includes(q)) return false;
      if(!matchesCategory(p, cat)) return false;
      if(!matchesReward(p, rew)) return false;
      if(!matchesTag(p, activeTag)) return false;
      return true;
    });
    render(list);
  }

  searchInput.addEventListener('input', applyFilters);
  categorySelect.addEventListener('change', applyFilters);
  rewardSelect.addEventListener('change', applyFilters);

  function filterTag(el){
    document.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    activeTag = el.textContent.trim();
    applyFilters();
  }

  applyFilters();

  const cur=document.getElementById('cur'),curR=document.getElementById('curR');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
  (function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(loop);})();
  document.querySelectorAll('a,button,input,select').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));});
  const TH={dark:{i:'◑',n:'Dark Terminal'},light:{i:'○',n:'Clean Light'},midnight:{i:'◉',n:'Midnight'},solar:{i:'◐',n:'Solar Flare'},ice:{i:'◌',n:'Ice Blue'}};
  let pOpen=false;
  function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ct',t);document.getElementById('ti').textContent=TH[t].i;document.getElementById('tn').textContent=TH[t].n;document.querySelectorAll('.to').forEach(o=>o.classList.toggle('active',o.dataset.t===t));closePanel();}
  function togglePanel(){pOpen=!pOpen;document.getElementById('tp').classList.toggle('open',pOpen);}
  function closePanel(){pOpen=false;document.getElementById('tp').classList.remove('open');}
  document.addEventListener('click',e=>{if(!e.target.closest('.ts'))closePanel();});
  setTheme(localStorage.getItem('ct')||'dark');
</script>
</body>
</html>
